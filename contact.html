<section class="contact">

<h1>Contact Us</h1>

<form id="contactForm">

<label for="name">Name</label>
<input
type="text"
id="name"
placeholder="Your Name"
required>

<label for="email">Email</label>

<input
type="email"
id="email"
placeholder="Your Email"
required>

<label for="message">Message</label>

<textarea
id="message"
rows="6"
placeholder="Your Message"
required></textarea>

<button type="submit">

Send Message

</button>

</form>

<h3 id="success"></h3>
