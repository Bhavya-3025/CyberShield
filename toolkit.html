<section class="toolkit">

<h1>Cyber Security Toolkit</h1>

<div class="tool-card">

<h2>🔑 Password Generator</h2>

<label for="length">Password Length</label>

<input type="range" min="6" max="24" value="12" id="length">

<p>Length : <span id="lengthValue">12</span></p>

<input type="text" id="password" readonly>

<button onclick="generatePassword()">

Generate Password

</button>

</div>

<div class="tool-card">

<h2>💪 Password Strength Checker</h2>

<input type="text" id="checkPassword" placeholder="Enter Password">

<button onclick="checkStrength()">

Check Strength

</button>

<h3 id="strength"></h3>

</div>

<div class="tool-card">

<h2>🌐 URL Safety Checker</h2>

<input type="text" id="urlInput" placeholder="https://example.com">

<button onclick="checkURL()">

Check URL

</button>

<h3 id="urlResult"></h3>

</div>

</section>
